<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Anand Kumar Awasthi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
  </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-900 text-white flex-col hidden md:flex shrink-0">
    <div class="p-6 border-b border-slate-700/50 flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-yellow-600 to-yellow-400 flex items-center justify-center text-xl shadow-lg">
        ⚖️
      </div>
      <div>
        <div class="text-sm font-bold tracking-wide">ADMIN PANEL</div>
        <div class="text-[10px] text-slate-400 uppercase tracking-wider">Awasthi & Associates</div>
      </div>
    </div>
    
    <nav class="flex-1 p-4 space-y-1">
      <a href="#" class="flex items-center gap-3 px-4 py-3 bg-white/10 text-white rounded-lg border-l-4 border-yellow-500 transition-colors">
        <i class="bi bi-grid-1x2-fill text-yellow-500"></i>
        <span class="font-medium text-sm">Dashboard</span>
      </a>
    </nav>
    
    <div class="p-4 border-t border-slate-700/50">
      <a href="index.html" class="flex items-center gap-3 px-4 py-2 text-red-400 hover:bg-white/5 rounded-lg transition-colors text-sm font-medium">
        <i class="bi bi-box-arrow-left"></i>
        Back to Website
      </a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 flex flex-col h-screen overflow-y-auto">
    
    <!-- TOPBAR -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
      <div class="md:hidden font-bold text-slate-900 flex items-center gap-2">
        <span class="text-yellow-500 text-xl">⚖️</span> Admin
      </div>
      <div class="hidden md:block"></div>
      
      <div class="flex items-center gap-3">
        <div class="text-right hidden sm:block">
          <div class="text-sm font-semibold text-slate-900">Anand Kumar Awasthi</div>
          <div class="text-xs text-slate-500">Super Admin</div>
        </div>
        <div class="w-9 h-9 rounded-full bg-yellow-500 text-white flex items-center justify-center font-bold shadow-sm">
          AK
        </div>
      </div>
    </header>

    <!-- DASHBOARD CONTENT -->
    <div class="p-6 md:p-10 max-w-5xl mx-auto w-full">
      <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-8">Overview Dashboard</h1>
      
      <!-- STATS DISPLAY -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="bg-white rounded-2xl p-6 flex items-center gap-5 relative overflow-hidden border border-slate-200 shadow-sm group">
          <div class="absolute -right-6 -top-6 text-yellow-500/10 group-hover:scale-110 transition-transform duration-500">
            <i class="bi bi-globe text-9xl"></i>
          </div>
          <div class="w-14 h-14 rounded-xl bg-yellow-50 text-yellow-600 flex items-center justify-center text-2xl z-10 border border-yellow-100">
            <i class="bi bi-bar-chart-line-fill"></i>
          </div>
          <div class="z-10">
            <h3 class="text-4xl font-extrabold text-slate-900 mb-1">17</h3>
            <p class="text-sm font-medium text-slate-500 uppercase tracking-wide">Website Visits</p>
          </div>
        </div>
      </div>

    </div>
  </main>

</body>
</html>
